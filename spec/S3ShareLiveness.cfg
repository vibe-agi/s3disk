SPECIFICATION FairSpec

CONSTANTS
    Consumers = {b, c}
    MaxRevision = 1
    Expiry = 1
    InitialLazyBudget = 1
    RetentionLimit = 1
    ObjectIndexes = {chunk}
    RootKey = rootKey
    PrimaryConsumer = b
    Mode = "liveness"

PROPERTIES
    TimelyStableConsumersConverge

CHECK_DEADLOCK FALSE

CONSTRAINT ConsumerCompositionConstraint
