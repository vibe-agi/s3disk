services:
  minio:
    image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: s3disk
      MINIO_ROOT_PASSWORD: s3disk-secret
    ports:
      - target: 9000
        published: "0"
        host_ip: 127.0.0.1
        protocol: tcp
