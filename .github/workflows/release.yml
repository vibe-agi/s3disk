name: Open-source release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

concurrency:
  group: open-source-release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.5"
  GOVULNCHECK_VERSION: "v1.6.0"
  ACTIONLINT_VERSION: "v1.7.7"
  STATICCHECK_VERSION: "v0.7.0"
  GOWORK: "off"
  GOFLAGS: "-mod=readonly"
  GOTOOLCHAIN: "local"

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
          rg --version
      - name: Validate tag and source identity
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_TYPE" == tag ]]
          [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease=${GITHUB_REF_NAME#*-}
            IFS=. read -r -a identifiers <<<"$prerelease"
            for identifier in "${identifiers[@]}"; do
              [[ ! "$identifier" =~ ^[0-9]+$ || "$identifier" == 0 || "$identifier" != 0* ]]
            done
          fi
          [[ "$(git rev-list -n 1 "$GITHUB_REF_NAME")" == "$GITHUB_SHA" ]]
          [[ "$(go env GOVERSION)" == "go$GO_VERSION" ]]
      - name: Check source and dependency hygiene
        shell: bash
        run: |
          set -euo pipefail
          go mod verify
          tidy_diff=$(go mod tidy -diff)
          [[ -z "$tidy_diff" ]] || {
            printf '%s\n' "$tidy_diff" >&2
            exit 1
          }
          unformatted=$(rg --files -g '*.go' -0 | xargs -0 gofmt -l)
          [[ -z "$unformatted" ]] || {
            printf '%s\n' "$unformatted" >&2
            exit 1
          }
          ./scripts/check-project-license.sh
          ./scripts/check-third-party.sh
          ./scripts/check-fuzz-wiring.sh
      - name: Test and vet
        shell: bash
        run: |
          set -euo pipefail
          go test ./... -count=1 -timeout=180s
          go test -race ./... -count=1 -timeout=300s
          go vet ./...
      - name: Run static analysis and vulnerability scan
        shell: bash
        env:
          GOFLAGS: ""
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/s3disk-release-tools"
          mkdir -p "$tool_dir"
          GOBIN="$tool_dir" go install "honnef.co/go/tools/cmd/staticcheck@$STATICCHECK_VERSION"
          GOBIN="$tool_dir" go install "golang.org/x/vuln/cmd/govulncheck@$GOVULNCHECK_VERSION"
          PATH="$tool_dir:$PATH" ./scripts/check-staticcheck.sh
          "$tool_dir/govulncheck" -version
          "$tool_dir/govulncheck" -scan=module
      - name: Lint release workflow
        shell: bash
        env:
          GOFLAGS: ""
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/s3disk-release-tools"
          mkdir -p "$tool_dir"
          GOBIN="$tool_dir" go install "github.com/rhysd/actionlint/cmd/actionlint@$ACTIONLINT_VERSION"
          "$tool_dir/actionlint" -color=false
      - name: Run MinIO integration
        shell: bash
        run: ./scripts/test-minio.sh
      - name: Check formal models
        shell: bash
        run: ./scripts/check-model.sh
      - name: Run deterministic workspace scale smoke
        shell: bash
        run: ./scripts/test-scale.sh

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            cgo: "0"
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04
            cgo: "0"
          - goos: darwin
            goarch: amd64
            runner: macos-14
            cgo: "1"
          - goos: darwin
            goarch: arm64
            runner: macos-14
            cgo: "1"
    steps:
      - name: Check out tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Build versioned archive
        shell: bash
        env:
          TARGET_GOOS: ${{ matrix.goos }}
          TARGET_GOARCH: ${{ matrix.goarch }}
          TARGET_CGO: ${{ matrix.cgo }}
        run: |
          set -euo pipefail
          package="s3disk-${GITHUB_REF_NAME}-${TARGET_GOOS}-${TARGET_GOARCH}"
          package_dir="$RUNNER_TEMP/$package"
          output_dir="$GITHUB_WORKSPACE/dist"
          mkdir -p "$package_dir" "$output_dir"
          binary="$package_dir/s3disk"
          GOOS="$TARGET_GOOS" GOARCH="$TARGET_GOARCH" CGO_ENABLED="$TARGET_CGO" \
            go build -trimpath -buildvcs=true \
              -ldflags="-s -w -X main.version=$GITHUB_REF_NAME" \
              -o "$binary" ./cmd/s3disk
          cp LICENSE NOTICE THIRD_PARTY_NOTICES.md README.md README.zh-CN.md \
            SUPPORT.md SECURITY.md CONTRIBUTING.md "$package_dir/"
          cp -R docs "$package_dir/"
          go version -m "$binary" >"$package_dir/build-info.txt"
          archive="$package.tar.gz"
          if [[ "$RUNNER_OS" == Linux ]]; then
            source_date_epoch=$(git show -s --format=%ct "$GITHUB_SHA")
            find "$package_dir" -exec touch -d "@$source_date_epoch" {} +
            tar --sort=name --mtime="@$source_date_epoch" --owner=0 --group=0 \
              --numeric-owner -C "$RUNNER_TEMP" -czf "$output_dir/$archive" "$package"
          else
            COPYFILE_DISABLE=1 tar -C "$RUNNER_TEMP" -czf "$output_dir/$archive" "$package"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            (cd "$output_dir" && sha256sum "$archive" >"$archive.sha256")
          else
            (cd "$output_dir" && shasum -a 256 "$archive" >"$archive.sha256")
          fi
      - name: Upload release archive
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Verify and publish archives
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for checksum in dist/*.sha256; do
            (cd dist && sha256sum --check --strict "${checksum##*/}")
          done
          sha256sum dist/*.tar.gz | sed 's#  dist/#  #' >dist/checksums.txt
          prerelease=()
          if [[ "$GITHUB_REF_NAME" == v0.* || "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease=(--prerelease)
          fi
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz \
              dist/*.sha256 dist/checksums.txt --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz \
              dist/*.sha256 dist/checksums.txt --verify-tag --generate-notes \
              --title "s3disk $GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              "${prerelease[@]}"
          fi
