name: CI

on:
  push:
    branches: [master]
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.5"
  MINIMUM_GO_VERSION: "1.25.12"
  GOVULNCHECK_VERSION: "v1.6.0"
  ACTIONLINT_VERSION: "v1.7.7"
  STATICCHECK_VERSION: "v0.7.0"
  GOWORK: "off"
  GOFLAGS: "-mod=readonly"

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out complete history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check pull-request commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./scripts/check-dco.sh "$BASE_SHA..$HEAD_SHA"
      - name: Check merge-queue commits
        if: github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: ./scripts/check-dco.sh "$BASE_SHA..$HEAD_SHA"
      - name: Check pushed commits
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "$BEFORE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]] ||
            ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null
          then
            # A lone revision makes check-dco scan every reachable non-merge
            # ancestor, covering a new or force-updated branch fail-closed.
            ./scripts/check-dco.sh "$HEAD_SHA"
          else
            ./scripts/check-dco.sh "$BEFORE_SHA..$HEAD_SHA"
          fi
      - name: Check dispatched commit
        if: github.event_name == 'workflow_dispatch'
        run: ./scripts/check-dco.sh 'HEAD^!'

  native-platforms:
    name: Native tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Run native tests
        shell: bash
        env:
          GOWORK: "off"
          GOFLAGS: "-mod=readonly"
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            git rev-parse HEAD
            go version
            go env GOOS GOARCH GOVERSION GOWORK GOFLAGS
            uname -a
          } 2>&1 | tee artifacts/environment.log
          go test ./... -count=1 -timeout=120s -json 2>&1 | tee artifacts/native-tests.json
      - name: Require Darwin trust-state ACL tests
        if: runner.os == 'macOS'
        shell: bash
        run: |
          [[ "$(go env CGO_ENABLED)" == 1 ]] || {
            echo "Darwin trust-state tests require CGO_ENABLED=1" >&2
            exit 1
          }
          ./scripts/run-required-go-test.sh . TestDarwinTrustStateRevalidatesExtendedACLs 60s
          ./scripts/run-required-go-test.sh . TestProtectWatermarkFileRejectsInheritedDarwinACL 60s
      - name: Archive native evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: native-evidence-${{ matrix.os }}-${{ github.sha }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  minimum-go:
    name: Oldest supported patched Go (1.25.12)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: "local"
      GOFLAGS: "-mod=readonly"
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up minimum supported Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.MINIMUM_GO_VERSION }}
          cache: false
      - name: Run minimum-version tests
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(go env GOVERSION)" == "go$MINIMUM_GO_VERSION" ]] || {
            echo "minimum-version job requires go$MINIMUM_GO_VERSION" >&2
            exit 1
          }
          mkdir -p artifacts
          {
            git rev-parse HEAD
            go version
            go env GOOS GOARCH GOVERSION GOWORK GOFLAGS GOTOOLCHAIN
            uname -a
          } 2>&1 | tee artifacts/environment.log
          go test ./... -count=1 -timeout=120s -json 2>&1 | tee artifacts/minimum-go-tests.json
      - name: Archive minimum-version evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: minimum-go-evidence-${{ github.sha }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

  cross-build:
    name: Cross-build (${{ matrix.target }})
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: freebsd-amd64
            goos: freebsd
            goarch: amd64
          - target: windows-amd64
            goos: windows
            goarch: amd64
          - target: windows-arm64
            goos: windows
            goarch: arm64
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOTOOLCHAIN: "local"
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Build all packages
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(go env GOVERSION)" == "go$GO_VERSION" ]]
          mkdir -p artifacts
          {
            git rev-parse HEAD
            go version
            go env GOOS GOARCH GOVERSION CGO_ENABLED GOWORK GOFLAGS GOTOOLCHAIN
            go build -trimpath ./...
            go test -exec=true ./...
          } 2>&1 | tee artifacts/cross-build.log
      - name: Archive cross-build evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: cross-build-${{ matrix.target }}-${{ github.sha }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

  quality:
    name: Unit, race, vet, and compliance
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Install audit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep
          rg --version
      - name: Record environment
        run: |
          mkdir -p artifacts
          {
            go version
            go env GOOS GOARCH GOVERSION
            uname -a
          } | tee artifacts/environment.log
      - name: Download dependencies
        run: |
          set -euo pipefail
          go mod download
          git diff --exit-code -- go.mod go.sum
      - name: Check module and source hygiene
        run: |
          set -o pipefail
          go mod verify 2>&1 | tee artifacts/go-mod-verify.log
          tidy_diff=$(go mod tidy -diff)
          if [[ -n "$tidy_diff" ]]; then
            printf '%s\n' "$tidy_diff" | tee artifacts/go-mod-tidy.diff
            exit 1
          fi
          unformatted=$(rg --files -g '*.go' -0 | xargs -0 gofmt -l)
          if [[ -n "$unformatted" ]]; then
            printf '%s\n' "$unformatted" | tee artifacts/gofmt.log
            exit 1
          fi
      - name: Unit tests
        run: |
          set -o pipefail
          go test ./... -count=1 -timeout=90s -json 2>&1 | tee artifacts/unit-tests.json
      - name: Race tests
        run: |
          set -o pipefail
          go test -race ./... -count=1 -timeout=180s -json 2>&1 | tee artifacts/race-tests.json
      - name: Vet
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee artifacts/vet.log
      - name: Static analysis
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/s3disk-ci-staticcheck"
          {
            mkdir -p "$tool_dir"
            (
              cd "$RUNNER_TEMP"
              GOFLAGS="" GOWORK=off GOTOOLCHAIN=local GOBIN="$tool_dir" go install \
                "honnef.co/go/tools/cmd/staticcheck@$STATICCHECK_VERSION"
            )
            PATH="$tool_dir:$PATH" ./scripts/check-staticcheck.sh
            git diff --exit-code -- go.mod go.sum
          } 2>&1 | tee artifacts/staticcheck.log
      - name: Scan modules for known vulnerabilities
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/s3disk-ci-tools"
          mkdir -p "$tool_dir"
          {
            GOFLAGS="" GOBIN="$tool_dir" go install \
              "golang.org/x/vuln/cmd/govulncheck@$GOVULNCHECK_VERSION"
            "$tool_dir/govulncheck" -version
            "$tool_dir/govulncheck" -scan=module
          } 2>&1 | tee artifacts/govulncheck.log
      - name: Protocol fuzz smoke tests
        run: |
          set -o pipefail
          ./scripts/check-fuzz-wiring.sh 2>&1 | tee artifacts/fuzz-wiring.log
          go test ./ -run='^$' -fuzz='^FuzzDecodeReferenceNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-reference.log
          go test ./ -run='^$' -fuzz='^FuzzVerifySignedReferenceNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-signed-reference.log
          go test ./ -run='^$' -fuzz='^FuzzOpenRepositoryDescriptorNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-repository-descriptor.log
          go test ./ -run='^$' -fuzz='^FuzzClientEncryptionOpenObjectMalformed$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-client-encryption.log
          go test ./publisherstate -run='^$' -fuzz='^FuzzAESGCMProtectorOpenNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-publisher-state.log
          go test ./ -run='^$' -fuzz='^FuzzParseSealedStateFileNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-sealed-state.log
          go test ./internal/cli -run='^$' -fuzz='^FuzzDecodeRecoveryKeyFileNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-recovery-key.log
          go test ./internal/cli -run='^$' -fuzz='^FuzzDecodePublisherSessionNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-publisher-session.log
          go test ./presignedshare -run='^$' -fuzz='^FuzzDecodeRootRecoveryRecordNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-root-recovery.log
          go test ./internal/tlsroots -run='^$' -fuzz='^FuzzParsePEMCertificatesNeverPanics$' \
            -fuzztime=10s 2>&1 | tee artifacts/fuzz-tls-roots.log
      - name: Third-party compliance
        run: |
          set -o pipefail
          ./scripts/check-project-license.sh 2>&1 | tee artifacts/project-license.log
          ./scripts/check-third-party.sh 2>&1 | tee artifacts/third-party.log
      - name: Release reference gate self-test
        run: |
          set -o pipefail
          ./scripts/test-release-ref.sh 2>&1 | tee artifacts/release-reference-test.log
      - name: DCO gate self-test
        run: |
          set -o pipefail
          ./scripts/test-dco.sh 2>&1 | tee artifacts/dco-test.log
      - name: Lint GitHub Actions workflows
        env:
          GOFLAGS: ""
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/s3disk-ci-tools"
          mkdir -p "$tool_dir"
          GOBIN="$tool_dir" go install \
            "github.com/rhysd/actionlint/cmd/actionlint@$ACTIONLINT_VERSION"
          "$tool_dir/actionlint" -color=false 2>&1 | tee artifacts/actionlint.log
      - name: Archive quality evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: quality-evidence-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

  minio:
    name: MinIO integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Run pinned MinIO integration
        run: |
          set -o pipefail
          mkdir -p artifacts
          {
            docker version
            docker compose version
          } 2>&1 | tee artifacts/docker-environment.log
          ./scripts/test-minio.sh 2>&1 | tee artifacts/minio.log
      - name: Archive MinIO evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: minio-evidence-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

  model:
    name: TLA+ model checking
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run model checker
        run: |
          set -o pipefail
          mkdir -p artifacts
          java -version 2>&1 | tee artifacts/java-environment.log
          ./scripts/check-model.sh 2>&1 | tee artifacts/model-check.log
      - name: Archive model evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: model-evidence-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

  scale:
    name: Deterministic workspace scale smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Run scale smoke profile
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          {
            go version
            go env GOOS GOARCH GOVERSION
            uname -a
          } 2>&1 | tee artifacts/scale-environment.log
          ./scripts/test-scale.sh 2>&1 | tee artifacts/scale-profile.jsonl
      - name: Archive scale evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: scale-evidence-${{ github.sha }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30

  required-gate:
    name: Required CI gate
    if: always()
    needs:
      - dco
      - native-platforms
      - minimum-go
      - cross-build
      - quality
      - minio
      - model
      - scale
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Require every protected job
        env:
          DCO_RESULT: ${{ needs.dco.result }}
          NATIVE_RESULT: ${{ needs.native-platforms.result }}
          MINIMUM_GO_RESULT: ${{ needs.minimum-go.result }}
          CROSS_BUILD_RESULT: ${{ needs.cross-build.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          MINIO_RESULT: ${{ needs.minio.result }}
          MODEL_RESULT: ${{ needs.model.result }}
          SCALE_RESULT: ${{ needs.scale.result }}
        run: |
          set -euo pipefail
          require_success() {
            local job_name=$1
            local result=$2
            if [[ "$result" != "success" ]]; then
              echo "required job $job_name finished with result $result" >&2
              exit 1
            fi
          }
          require_success dco "$DCO_RESULT"
          require_success native-platforms "$NATIVE_RESULT"
          require_success minimum-go "$MINIMUM_GO_RESULT"
          require_success cross-build "$CROSS_BUILD_RESULT"
          require_success quality "$QUALITY_RESULT"
          require_success minio "$MINIO_RESULT"
          require_success model "$MODEL_RESULT"
          require_success scale "$SCALE_RESULT"
