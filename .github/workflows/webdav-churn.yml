name: WebDAV sustained churn

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: read

concurrency:
  group: webdav-churn-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.5"

jobs:
  webdav-churn:
    name: WebDAV sustained-churn profile
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Run sustained-churn profile
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts
          {
            git rev-parse HEAD
            go version
            go env GOOS GOARCH GOVERSION
            uname -a
          } 2>&1 | tee artifacts/environment.log
          ./scripts/test-webdav-churn.sh 2>&1 | tee artifacts/webdav-churn.jsonl
      - name: Archive churn evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: webdav-churn-${{ github.sha }}-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
